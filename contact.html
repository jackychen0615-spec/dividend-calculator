<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我們 - 股利計算器</title>
  <meta name="description" content="有任何問題或建議？歡迎透過表單聯絡股利計算器團隊。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="index.html" class="nav-logo">$<span>股利計算器</span></a>
      <button class="nav-toggle" aria-label="選單">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">首頁</a></li>
        <li><a href="about.html">關於我們</a></li>
        <li><a href="contact.html" class="active">聯絡我們</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <article class="page-content">
      <h1>聯絡我們</h1>
      <p>有任何問題、建議或合作提案，歡迎填寫以下表單，我們會盡快回覆。</p>

      <form class="contact-form" onsubmit="event.preventDefault(); alert('感謝您的訊息！我們會盡快回覆。'); this.reset();">
        <div class="form-group">
          <label for="contactName">姓名</label>
          <input type="text" id="contactName" placeholder="您的姓名" required>
        </div>
        <div class="form-group">
          <label for="contactEmail">電子郵件</label>
          <input type="email" id="contactEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="contactMessage">訊息內容</label>
          <textarea id="contactMessage" placeholder="請輸入您的訊息..." required></textarea>
        </div>
        <button type="submit" class="btn-primary">送出訊息</button>
      </form>
    </article>
  </main>

  <footer class="site-footer">
    <ul class="footer-links">
      <li><a href="privacy.html">隱私權政策</a></li>
      <li><a href="terms.html">使用條款</a></li>
    </ul>

  </footer>

  <script src="js/calculator.js"></script>
