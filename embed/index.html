<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股利殖利率計算器 - GULICALC</title>
<meta name="robots" content="noindex, follow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; background: #fff; color: #1f2937; padding: 14px; line-height: 1.5; }
  .w { max-width: 420px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,.05); }
  .hd { background: linear-gradient(135deg,#0891b2,#0e7490); padding: .9rem 1.1rem; }
  .hd h1 { font-size: 1rem; color: #fff; font-weight: 700; }
  .hd p { font-size: .72rem; color: rgba(255,255,255,.8); margin-top: .15rem; }
  .bd { padding: 1rem 1.1rem; }
  label { font-size: .72rem; font-weight: 600; color: #6b7280; display: block; margin-bottom: .25rem; }
  input { width: 100%; padding: .55rem .7rem; background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 9px; font-size: 1rem; color: #1f2937; outline: none; transition: border .2s; }
  input:focus { border-color: #0891b2; background: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; margin-bottom: .7rem; }
  .res { display: none; border-top: 1px solid #f3f4f6; margin-top: .3rem; padding-top: .9rem; text-align: center; }
  .res.on { display: block; }
  .yl { font-size: .68rem; color: #9ca3af; font-weight: 600; }
  .yv { font-size: 2rem; font-weight: 800; color: #0891b2; line-height: 1.15; }
  .sub { display: flex; justify-content: center; gap: 1.6rem; margin-top: .6rem; }
  .sub > div { text-align: center; }
  .sub .k { font-size: .66rem; color: #9ca3af; }
  .sub .v { font-size: 1.05rem; font-weight: 700; margin-top: .1rem; }
  .hint { font-size: .8rem; color: #b0b8c4; text-align: center; padding: .6rem 0 .2rem; }
  .ft { text-align: center; padding: .55rem; border-top: 1px solid #f3f4f6; }
  .ft a { font-size: .76rem; color: #0891b2; text-decoration: none; font-weight: 600; }
  .ft a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="w">
  <div class="hd">
    <h1>股利殖利率計算器</h1>
    <p>輸入股價、張數、每股股利，立即算殖利率</p>
  </div>
  <div class="bd">
    <div class="row">
      <div><label for="p">股價（元）</label><input type="number" id="p" placeholder="50" min="0" step="0.01"></div>
      <div><label for="s">張數</label><input type="number" id="s" placeholder="1" min="0" step="1"></div>
    </div>
    <div style="margin-bottom:.7rem;"><label for="d">每股股利（元）</label><input type="number" id="d" placeholder="2" min="0" step="0.01"></div>
    <div class="hint" id="hint">填完三個欄位，結果馬上出來</div>
    <div class="res" id="res">
      <div class="yl">殖利率</div>
      <div class="yv"><span id="y">0</span>%</div>
      <div class="sub">
        <div><div class="k">投入成本</div><div class="v" id="c">0</div></div>
        <div><div class="k">年領股利</div><div class="v" style="color:#10b981;" id="t">0</div></div>
      </div>
    </div>
  </div>
  <div class="ft"><a href="https://gulicalc.com/" target="_blank" rel="noopener">📊 由 股利計算器 GULICALC 提供</a></div>
</div>
<script>
(function(){
  var p=document.getElementById('p'),s=document.getElementById('s'),d=document.getElementById('d');
  var res=document.getElementById('res'),hint=document.getElementById('hint');
  function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
  function calc(){
    var price=Math.max(0,parseFloat(p.value)||0);
    var lots=Math.max(0,parseFloat(s.value)||0);
    var div=Math.max(0,parseFloat(d.value)||0);
    var shares=lots*1000;
    var cost=shares*price, total=shares*div, y=price>0?div/price*100:0;
    if(price>0&&lots>0&&div>0){res.classList.add('on');hint.style.display='none';}
    else{res.classList.remove('on');hint.style.display='block';}
    document.getElementById('y').textContent=y.toFixed(2);
    document.getElementById('c').textContent=fmt(cost);
    document.getElementById('t').textContent=fmt(total);
  }
  [p,s,d].forEach(function(el){el.addEventListener('input',calc);});
})();
</script>
</body>
</html>
