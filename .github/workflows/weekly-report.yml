name: 每週自動生成台股週報

on:
  schedule:
    - cron: '0 1 * * 1'   # 每週一 01:00 UTC（台灣 09:00）
  workflow_dispatch: {}    # 也可手動執行

permissions:
  contents: write

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成週報文章
        run: python scripts/generate_weekly_report.py

      - name: Commit 變更（若有）
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes" && echo "changed=false" >> $GITHUB_OUTPUT && exit 0
          git commit -m "auto: $(date +%Y)年第$(date +%V)週台股週報自動生成"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Telegram 通知
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="📊 <b>GULICALC 週報已自動生成</b>%0A%0A$(date +%Y)年第$(date +%V)週台股週報已發布。%0A%0A👉 https://gulicalc.com/articles/weekly-report-$(date +%Y)-w$(date +%V)"
