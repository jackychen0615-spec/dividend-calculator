name: 計算器健檢（壞了就 TG 警告）

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小時檢查一次（UTC）
  workflow_dispatch: {}      # 也可在 Actions 頁手動執行

permissions:
  contents: read

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行計算器健檢（線上 gulicalc.com）
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/health_check.py
        # 腳本發現問題會 exit 1 → 此步驟失敗、Action 顯示紅燈，並已 TG 警告站長
