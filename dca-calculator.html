<body>

    <nav class="nav-container">

  <main>
    <section class="calculator-hero">
      <h1>定期定額試算器</h1>
      <p>計算每月定期定額投資的長期成果</p>
    </section>

    <div class="calculator-card">
      <div class="form-group">
        <label for="monthlyAmount">每月投入金額（元）</label>
        <input type="number" id="monthlyAmount" placeholder="例如：5000" min="0" step="1">
      </div>
      <div class="form-group">
        <label for="annualReturn">預期年報酬率（%）</label>
        <input type="number" id="annualReturn" placeholder="例如：8" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label for="investYears">投資年數</label>
        <input type="number" id="investYears" placeholder="例如：10" min="0" step="1">
      </div>
    </div>

    <div class="results-grid">
      <div class="result-card">
        <div class="result-label">總投入金額</div>
        <div class="result-value" id="totalInput">0</div>
        <div class="result-unit">元</div>
      </div>
      <div class="result-card">
        <div class="result-label">預估總資產</div>
        <div class="result-value accent-green" id="totalValue">0</div>
        <div class="result-unit">元</div>
      </div>
      <div class="result-card">
        <div class="result-label">投資報酬</div>
        <div class="result-value" id="totalReturn">0</div>
        <div class="result-unit">元</div>
      </div>
    </div>

    <div class="feedback-wrapper">
      <button class="feedback-btn">&#9733; 給我們回饋</button>
    </div>

    <div class="feedback-overlay">
      <div class="feedback-modal">
        <h3>你覺得這個工具如何？</h3>
        <div class="feedback-stars">
          <button>&#9733;</button>
          <button>&#9733;</button>
          <button>&#9733;</button>
          <button>&#9733;</button>
          <button>&#9733;</button>
        </div>
        <textarea placeholder="有什麼建議嗎？（選填）"></textarea>
        <div class="feedback-actions">
          <button class="feedback-cancel">取消</button>
          <button class="feedback-submit">送出</button>
        </div>
        <div class="feedback-thanks">感謝你的回饋！<br><button class="feedback-close btn-primary" style="margin-top:1rem;">關閉</button></div>
      </div>
    </div>

    <section class="faq-section" style="margin-top:2rem;">

          <p>快速算出持股的總股利與殖利率。</p>
          <span class="article-tag">股利試算</span>
        </div>
        <div class="article-card">
          <h3><a href="compound-calculator.html">存股複利計算器</a></h3>
          <p>計算長期存股的複利成長效果，看見時間的力量。</p>
          <span class="article-tag">複利試算</span>
        </div>
        <div class="article-card">
          <h3><a href="payback-calculator.html">存股回本計算器</a></h3>
